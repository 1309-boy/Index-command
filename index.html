<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MCBE Indexing Generator Pro</title>
    <style>
        :root { --primary: #27ae60; --error: #e74c3c; --dark: #2c3e50; --light-bg: #f8f9fa; --text-gray: #7f8c8d; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; color: var(--dark); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; margin: auto; }
        .lang-switch { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .lang-btn { font-size: 28px; cursor: pointer; background: none; border: 2px solid transparent; border-radius: 10px; padding: 5px; transition: 0.2s; }
        .lang-btn.active { border-color: var(--primary); background: rgba(39, 174, 96, 0.05); }
        h2 { margin: 10px 0 5px 0; font-weight: 800; text-align: center; font-size: 1.5rem; }
        .description { text-align: center; color: var(--text-gray); margin-bottom: 20px; font-size: 0.9rem; }
        .info-box { background: var(--light-bg); border-left: 5px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.6; }
        .alert-box { background: #fff5f5; color: var(--error); border: 1px solid var(--error); padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 0.85rem; display: none; }
        .config-section { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; }
        .config-section input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .scroll-window { max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 15px; padding: 10px; background: #fafafa; margin-bottom: 15px; }
        .row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; width: 100%; }
        input { padding: 12px 8px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; transition: all 0.2s; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1); }
        input.score { width: 55px !important; flex: none !important; text-align: center; }
        input.text { flex: 1 !important; min-width: 0; }
        input.error { border-color: var(--error) !important; background-color: #fffafa; }
        button { padding: 14px 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; touch-action: manipulation; }
        .btn-add { background: white; color: var(--dark); border: 2px dashed #ccc; width: 100%; margin-bottom: 15px; }
        .btn-gen { background: var(--primary); color: white; width: 100%; font-size: 1rem; }
        .btn-gen:disabled { background: #ccc; }
        .btn-del { background: #fdf2f2; color: var(--error); width: 40px !important; flex: none !important; padding: 12px 0; display: flex; justify-content: center; align-items: center; }
        textarea { width: 100%; height: 150px; margin-top: 20px; padding: 15px; border-radius: 15px; background: #2d3436; color: #ecf0f1; font-family: monospace; font-size: 0.8rem; border: none; resize: none; box-sizing: border-box; }
        .copy-btn { background: #3498db; color: white; width: 100%; margin-top: 10px; }
        @media (min-width: 600px) { .container { padding: 40px; } .config-section { flex-direction: row; align-items: center; } .row { gap: 10px; } input.score { width: 70px !important; } h2 { font-size: 2rem; } .scroll-window { max-height: 400px; } }
    </style>
</head>
<body onload="setLang('en')">
<div class="container">
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('en')">рҹҮәрҹҮё</button>
        <button class="lang-btn" onclick="setLang('ko')">рҹҮ°рҹҮ·</button>
        <button class="lang-btn" onclick="setLang('ja')">рҹҮҜрҹҮө</button>
    </div>
    <h2 id="ui-title">MCBE Indexing Generator</h2>
    <p class="description" id="ui-desc">Command tool using dynamic indexing</p>
    <div class="alert-box" id="ui-alert">вҡ пёҸ Warning: Duplicate score detected!</div>
    <div class="info-box" id="ui-info">
        <b>рҹ’Ў Note:</b><br>Each score naturally extends to just before the next item's score.<br>(e.g., [2: Apple], [5: Tree] вҶ’ 2-4 outputs Apple, 5+ outputs Tree)
    </div>
    <div class="config-section"><span id="ui-score-label">Scoreboard Name:</span><input type="text" id="objName" value="obj" oninput="validateAll()"></div>
    <div class="scroll-window" id="input-container">
        <div class="row">
            <input type="number" class="score" placeholder="0" value="0" step="any" onblur="normalizeScore(this)" oninput="validateAll()">
            <input type="text" class="text" placeholder="Text to output" onfocus="finalizeScore(this)" oninput="validateAll()">
            <button class="btn-del" style="visibility: hidden;">X</button>
        </div>
    </div>
    <button class="btn-add" id="ui-add-btn" onclick="addRow()">+ Add Item</button>
    <button class="btn-gen" id="ui-gen-btn" onclick="generateCommand()">Generate Command</button>
    <textarea id="output" readonly placeholder="Output..."></textarea>
    <button class="copy-btn" id="ui-copy-btn" onclick="copyCommand()">Copy Result</button>
</div>

<script>
    const translations = {
        en: { title: "MCBE Indexing Generator", desc: "Command tool using dynamic indexing", alert: "вҡ пёҸ Warning: Duplicate score detected!", info: "<b>рҹ’Ў Note:</b><br>Each score naturally extends to just before the next item's score.<br>(e.g., [2: Apple], [5: Tree] вҶ’ 2-4 outputs Apple, 5+ outputs Tree)", scoreLabel: "Scoreboard Name:", addBtn: "+ Add Item", genBtn: "Generate Command", copyBtn: "Copy Result", placeholderText: "Text to output", copyMsg: "Copied!" },
        ko: { title: "MCBE лҸҷм Ғ мқёлҚұмӢұ м ңл„Ҳл Ҳмқҙн„°", desc: "лҸҷм Ғ мқёлҚұмӢұ мӣҗлҰ¬лҘј мқҙмҡ©н•ң м»Өл§Ёл“ң мғқм„ұ лҸ„кө¬", alert: "вҡ пёҸ кІҪкі : мӨ‘ліөлҗң мҠӨмҪ”м–ҙ к°’мқҙ мЎҙмһ¬н•©лӢҲлӢӨ!", info: "<b>рҹ’Ў м°ёкі  мӮ¬н•ӯ:</b><br>к°Ғ н•ӯлӘ©мқҳ мҠӨмҪ”м–ҙлҠ” мһҗм—°мҠӨлҹҪкІҢ <b>лӢӨмқҢ н•ӯлӘ©мқҳ мҠӨмҪ”м–ҙ м§Ғм „к№Ңм§Җ</b> лІ”мң„лЎң мқҙм–ҙм§‘лӢҲлӢӨ.<br>(мҳҲ: [2: мӮ¬кіј], [5: лӮҳл¬ҙ] мһ…л Ҙ мӢң вҶ’ 2~4м җмқҖ мӮ¬кіј, 5м җ мқҙмғҒмқҖ лӮҳл¬ҙ м¶ңл Ҙ)", scoreLabel: "мҠӨмҪ”м–ҙ мқҙлҰ„:", addBtn: "+ н•ӯлӘ© м¶”к°Җ", genBtn: "м»Өл§Ёл“ң мғқм„ұ", copyBtn: "кІ°кіј ліөмӮ¬н•ҳкё°", placeholderText: "м¶ңл Ҙн•  л¬ёмһҗ", copyMsg: "ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!" },
        ja: { title: "MCBEеӢ•м ҒгӮӨгғігғҮгғғгӮҜгӮ№з”ҹжҲҗеҷЁ", desc: "еӢ•м ҒгӮӨгғігғҮгғғгӮҜгӮ№гҒ®еҺҹзҗҶгӮ’еҲ©з”ЁгҒ—гҒҹгғ„гғјгғ«", alert: "вҡ пёҸ иӯҰе‘Ҡ: йҮҚиӨҮгҒҷгӮӢгӮ№гӮігӮўеҖӨгҒҢеӯҳеңЁгҒ—гҒҫгҒҷпјҒ", info: "<b>рҹ’Ў еҸӮиҖғдәӢй …:</b><br>еҗ„й …зӣ®гҒ®гӮ№гӮігӮўгҒҜгҖҒиҮӘз„¶гҒ«<b>ж¬ЎгҒ®й …зӣ®гҒ®гӮ№гӮігӮўгҒ®зӣҙеүҚгҒҫгҒ§</b>з№ӢгҒҢгӮҠгҒҫгҒҷгҖӮ<br>(дҫӢ: [2: гғӘгғігӮҙ], [5: жңЁ] е…ҘеҠӣжҷӮ вҶ’ 2~4зӮ№гҒҜгғӘгғігӮҙгҖҒ5зӮ№д»ҘдёҠгҒҜжңЁгӮ’еҮәеҠӣ)", scoreLabel: "гӮ№гӮігӮўеҗҚ:", addBtn: "+ й …зӣ®гӮ’иҝҪеҠ ", genBtn: "гӮігғһгғігғүз”ҹжҲҗ", copyBtn: "зөҗжһңгӮ’гӮігғ”гғј", placeholderText: "еҮәеҠӣгҒҷгӮӢж–Үеӯ—", copyMsg: "гӮігғ”гғјгҒ—гҒҫгҒ—гҒҹпјҒ" }
    };

    let currentLang = 'en';
    function setLang(lang) {
        currentLang = lang;
        document.getElementById('ui-title').innerText = translations[lang].title;
        document.getElementById('ui-desc').innerText = translations[lang].desc;
        document.getElementById('ui-alert').innerText = translations[lang].alert;
        document.getElementById('ui-info').innerHTML = translations[lang].info;
        document.getElementById('ui-score-label').innerText = translations[lang].scoreLabel;
        document.getElementById('ui-add-btn').innerText = translations[lang].addBtn;
        document.getElementById('ui-gen-btn').innerText = translations[lang].genBtn;
        document.getElementById('ui-copy-btn').innerText = translations[lang].copyBtn;
        document.querySelectorAll('.text').forEach(el => el.placeholder = translations[lang].placeholderText);
        document.querySelectorAll('.lang-btn').forEach(btn => { btn.classList.toggle('active', btn.innerText.includes(lang === 'en' ? 'рҹҮәрҹҮё' : lang === 'ko' ? 'рҹҮ°рҹҮ·' : 'рҹҮҜрҹҮө')); });
    }

    function normalizeScore(input) { if (input.value !== "") { const val = Math.floor(parseFloat(input.value)); input.value = isNaN(val) ? "" : val; validateAll(); } }
    function finalizeScore(textInput) { const row = textInput.parentElement; const scoreInput = row.querySelector('.score'); if (scoreInput && scoreInput.value === "" && scoreInput.placeholder !== "") { scoreInput.value = scoreInput.placeholder; } normalizeScore(scoreInput); }
    function getNextScoreHint() { const scoreInputs = document.querySelectorAll('.score'); let maxVal = -1; scoreInputs.forEach(input => { const val = Math.floor(parseFloat(input.value || input.placeholder || -1)); if (!isNaN(val) && val > maxVal) maxVal = val; }); return maxVal + 1; }

    function addRow() {
        document.querySelectorAll('.score').forEach(input => { if (input.value === "" && input.placeholder !== "") input.value = input.placeholder; normalizeScore(input); });
        const container = document.getElementById('input-container');
        const nextHint = getNextScoreHint();
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `<input type="number" class="score" placeholder="${nextHint}" step="any" onblur="normalizeScore(this)" oninput="validateAll()"><input type="text" class="text" placeholder="${translations[currentLang].placeholderText}" onfocus="finalizeScore(this)" oninput="validateAll()"><button class="btn-del" onclick="this.parentElement.remove(); validateAll()">X</button>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        validateAll();
    }

    function validateAll() {
        const scoreInputs = document.querySelectorAll('.score');
        const alertBox = document.getElementById('ui-alert');
        const genBtn = document.getElementById('ui-gen-btn');
        const scoreList = [];
        let hasDuplicate = false;
        scoreInputs.forEach(input => input.classList.remove('error'));
        scoreInputs.forEach((input) => {
            const rawVal = input.value;
            if (rawVal === "") return;
            const val = Math.floor(parseFloat(rawVal)).toString();
            if (scoreList.includes(val)) { hasDuplicate = true; scoreInputs.forEach(i => { if(i.value !== "" && Math.floor(parseFloat(i.value)).toString() === val) i.classList.add('error'); }); }
            scoreList.push(val);
        });
        alertBox.style.display = hasDuplicate ? 'block' : 'none';
        genBtn.disabled = hasDuplicate;
    }

    // вӯҗ н•өмӢ¬: %%9 м ңн•ң мӨҖмҲҳ мһ¬к·Җ нҠёлҰ¬ лЎңм§Ғ
    function buildTree(items, objName) {
        // лӢЁмқј н•ӯлӘ©мқё кІҪмҡ° (лҰ¬н”„ л…ёл“ң)
        if (items.length === 1 && !Array.isArray(items[0])) {
            return `{"text":"${items[0].t}"}`;
        }

        // 8к°ң мқҙн•ҳмқҳ н•ӯлӘ©л“Өмқҙ лҰ¬н”„ л…ёл“ң(лҚ°мқҙн„° к°қмІҙ)мқј кІҪмҡ° -> %%n к·ёлЈ№ мғқм„ұ
        if (items.length <= 8 && items.every(i => i.t !== undefined)) {
            const n = items.length;
            const selectors = items.map(i => `{"selector":"@s[scores={${objName}=${i.s}..}]"}`);
            const texts = items.map(i => `{"text":"${i.t}"}`).reverse();
            return `{"translate":"%%${n + 1}","with":{"rawtext":[${selectors.join(',')},${texts.join(',')}]}}`;
        }

        // 8к°ң лӢЁмң„лЎң лӮҳлҲ„кё° (лӘЁл“  л Ҳмқҙм–ҙлҠ” мөңлҢҖ 8л¶„кё°)
        let chunks = [];
        for (let i = 0; i < items.length; i += 8) {
            chunks.push(items.slice(i, i + 8));
        }

        // мІӯнҒ¬к°Җ лӢӨмӢң 8к°ңлҘј мҙҲкіјн•ҳл©ҙ, мқҙ мІӯнҒ¬л“Өмқ„ лӢӨмӢң 8к°ңм”© л¬¶м–ҙм•ј н•Ё (мһ¬к·Җм Ғ к·ёлЈ№нҷ”)
        if (chunks.length > 8) {
            return buildTree(chunks, objName); // мІӯнҒ¬ л°°м—ҙмқ„ лӢӨмӢң л¬¶мқҢ
        }

        // м—¬кё°м„ңл¶Җн„°лҠ” л¶„кё°к°Җ нҷ•мӢӨнһҲ 8к°ң мқҙн•ҳмһ„
        const selectors = chunks.map(chunk => {
            // мІӯнҒ¬ лӮҙмқҳ к°ҖмһҘ мІ« лІҲм§ё мӢӨм ң лҚ°мқҙн„°мқҳ мҠӨмҪ”м–ҙ м¶”м¶ң
            const getFirstScore = (c) => {
                if (c.s !== undefined) return c.s; // лҰ¬н”„
                return getFirstScore(c[0]); // мӨ‘мІ© кө¬мЎ° нғҗмғү
            };
            return `{"selector":"@s[scores={${objName}=${getFirstScore(chunk)}..}]"}`;
        });

        const subContents = chunks.map(chunk => buildTree(chunk, objName)).reverse();
        return `{"translate":"%%${selectors.length + 1}","with":{"rawtext":[${selectors.join(',')},${subContents.join(',')}]}}`;
    }

    function generateCommand() {
        const obj = document.getElementById('objName').value || 'obj';
        const scoreEls = document.querySelectorAll('.score');
        const textEls = document.querySelectorAll('.text');
        let data = [];
        for (let i = 0; i < scoreEls.length; i++) {
            const rawScore = scoreEls[i].value !== "" ? scoreEls[i].value : scoreEls[i].placeholder;
            const textVal = textEls[i].value;
            if (rawScore !== "" && textVal !== "") data.push({ s: Math.floor(parseFloat(rawScore)), t: textVal });
        }
        if (data.length === 0) return;
        data.sort((a, b) => a.s - b.s);

        const result = buildTree(data, obj);
        document.getElementById('output').value = `/execute as @a run titleraw @s actionbar {"rawtext":[${result}]}`;
    }

    function copyCommand() { const output = document.getElementById("output"); if(!output.value) return; output.select(); output.setSelectionRange(0, 99999); document.execCommand("copy"); alert(translations[currentLang].copyMsg); }
</script>
</body>
</html>
